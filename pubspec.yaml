name: noteapp
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.2.0 
  animated_splash_screen: ^1.3.0
  flutter_launcher_icons: ^0.14.4
  sqflite: ^2.4.2+1
  path: ^1.9.1
  
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/burger.jpg"
  min_sdk_android: 21 # android min sdk min:16, default 21

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/download.json
    - assets/burger.jpg
  